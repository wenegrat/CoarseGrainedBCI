name: Test Trigger

on:
  issue_comment:
    types: [created]

jobs:
  dispatch:
    name: Dispatch tests on PR branch
    runs-on: ubuntu-latest
    timeout-minutes: 5

    if: |
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, 'test')

    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - name: React to trigger comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Get PR branch and SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          echo "branch=$(echo "$PR" | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"
          echo "sha=$(echo "$PR" | jq -r '.head.sha')" >> "$GITHUB_OUTPUT"

      - name: Set commit status to pending
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.sha }}',
              state: 'pending',
              description: 'Tests dispatched…',
              context: 'Budget Closure Tests',
            });

      - name: Dispatch test workflow on PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run test.yml \
            --repo ${{ github.repository }} \
            --ref "${{ steps.pr.outputs.branch }}" \
            -f head_sha="${{ steps.pr.outputs.sha }}" \
            -f pr_number="${{ github.event.issue.number }}"
