name: Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      head_sha:
        description: 'PR head SHA for status reporting (set by test_trigger.yml)'
        required: false
        default: ''
      pr_number:
        description: 'PR number for commenting (set by test_trigger.yml)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run budget closure tests
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha || github.sha }}

      # -----------------------------------------------------------------------
      # Julia — run simulation
      # -----------------------------------------------------------------------
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - uses: julia-actions/cache@v2

      - name: Install Julia packages
        run: julia --project -e 'using Pkg; Pkg.instantiate()'

      - name: Run simulation (Nz=512, CPU)
        run: julia --project -t 4 kelvin_helmholtz_instability.jl --Nz 512 --Ri 0.1

      # -----------------------------------------------------------------------
      # Python — postprocessing pipeline
      # -----------------------------------------------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python packages
        run: pip install -r tests/requirements.txt

      - name: Create output directories
        run: mkdir -p figures animations postprocessing/output

      - name: Run postprocessing pipeline
        working-directory: postprocessing
        run: bash 00_get_budgets.sh output/khi_Nz512_Ri0.10.nc

      # -----------------------------------------------------------------------
      # Tests
      # -----------------------------------------------------------------------
      - name: Run budget closure tests
        id: pytest
        run: pytest tests/ -v -s

      - name: List output files
        if: always()
        run: |
          echo "=== figures/ ==="
          ls -la figures/ || echo "(directory missing)"
          echo "=== animations/ ==="
          ls -la animations/ || echo "(directory missing)"

      - name: Upload simulation animation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-animation
          path: animations/*.mp4
          if-no-files-found: warn

      - name: Upload budget plots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: budget-plots
          path: figures/*.png
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # Report back to PR (only when dispatched from test_trigger.yml)
      # -----------------------------------------------------------------------
      - name: Update commit status
        if: inputs.head_sha != '' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.pytest.outcome }}' === 'success';
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head_sha }}',
              state: success ? 'success' : 'failure',
              target_url: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              description: success ? 'All budget tests passed' : 'Budget tests failed',
              context: 'Budget Closure Tests',
            });

      - name: Comment on PR if tests failed
        if: inputs.pr_number != '' && always() && steps.pytest.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            github.rest.issues.createComment({
              issue_number: ${{ inputs.pr_number || 0 }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Budget closure tests failed.** [View run](${runUrl}) for details.`,
            });
