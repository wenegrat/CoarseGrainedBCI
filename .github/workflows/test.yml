name: Tests

on:
  push:
    branches:
      - main
  issue_comment:
    types: [created]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    if: |
      github.event_name == 'push' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       github.event.comment.body == 'test')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}

      # -----------------------------------------------------------------------
      # Julia — run simulation
      # -----------------------------------------------------------------------
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - uses: julia-actions/cache@v2

      - name: Install Julia packages
        run: julia --project -e 'using Pkg; Pkg.instantiate()'

      - name: Run simulation (Nz=512, CPU)
        run: julia --project -t 4 kelvin_helmholtz_instability.jl --Nz 512

      # -----------------------------------------------------------------------
      # Python — postprocessing pipeline
      # -----------------------------------------------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python packages
        run: pip install -r tests/requirements.txt

      - name: Run postprocessing pipeline
        working-directory: postprocessing
        run: bash 00_get_budgets.sh output/khi_180x1x512.nc

      # -----------------------------------------------------------------------
      # Tests
      # -----------------------------------------------------------------------
      - name: Run budget closure tests
        run: pytest tests/ -v -s
