name: Tests

on:
  push:
    branches:
      - main
  issue_comment:
    types: [created]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run budget closure tests
    runs-on: ubuntu-latest
    timeout-minutes: 360

    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request != null &&
       startsWith(github.event.comment.body, 'test'))

    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - name: React to trigger comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Get PR head SHA
        if: github.event_name == 'issue_comment'
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} --jq '.head.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Set commit status to pending
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.sha.outputs.sha }}',
              state: 'pending',
              target_url: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              description: 'Tests running…',
              context: 'Budget Closure Tests',
            });

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && steps.sha.outputs.sha || github.ref }}

      # -----------------------------------------------------------------------
      # Julia — run simulation
      # -----------------------------------------------------------------------
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - uses: julia-actions/cache@v2

      - name: Install Julia packages
        run: julia --project -e 'using Pkg; Pkg.instantiate()'

      - name: Run simulation (Nz=512, CPU)
        run: julia --project -t 4 kelvin_helmholtz_instability.jl --Nz 512

      # -----------------------------------------------------------------------
      # Python — postprocessing pipeline
      # -----------------------------------------------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python packages
        run: pip install -r tests/requirements.txt

      - name: Create output directories
        run: mkdir -p figures animations postprocessing/output

      - name: Run postprocessing pipeline
        working-directory: postprocessing
        run: bash 00_get_budgets.sh output/khi_180x1x512.nc

      # -----------------------------------------------------------------------
      # Tests
      # -----------------------------------------------------------------------
      - name: Run budget closure tests
        id: pytest
        run: pytest tests/ -v -s

      - name: List output files
        if: always()
        run: |
          echo "=== figures/ ==="
          ls -la figures/ || echo "(directory missing)"
          echo "=== animations/ ==="
          ls -la animations/ || echo "(directory missing)"

      - name: Upload simulation animation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-animation
          path: animations/*.mp4
          if-no-files-found: warn

      - name: Upload budget plots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: budget-plots
          path: figures/*.png
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # Report back to PR
      # -----------------------------------------------------------------------
      - name: Update commit status
        if: github.event_name == 'issue_comment' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.pytest.outcome }}' === 'success';
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.sha.outputs.sha }}',
              state: success ? 'success' : 'failure',
              target_url: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              description: success ? 'All budget tests passed' : 'Budget tests failed',
              context: 'Budget Closure Tests',
            });

      - name: Comment on PR if tests failed
        if: github.event_name == 'issue_comment' && always() && steps.pytest.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Budget closure tests failed.** [View run](${runUrl}) for details.`,
            });
