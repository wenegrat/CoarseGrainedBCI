name: Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      head_sha:
        description: 'PR head SHA for status reporting (set by test_trigger.yml)'
        required: false
        default: ''
      pr_number:
        description: 'PR number for commenting (set by test_trigger.yml)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Run the Julia simulation once; both test jobs share its output.
  # ---------------------------------------------------------------------------
  simulate:
    name: Run simulation
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha || github.sha }}

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - uses: julia-actions/cache@v2

      - name: Install Julia packages
        run: julia --project -e 'using Pkg; Pkg.instantiate()'

      - name: Run simulation (Nz=512, CPU)
        run: julia --project -t 2 kelvin_helmholtz_instability.jl --Nz 512 --Ri 0.1 --stop_time 70 --Re0 1e-3

      - name: Upload simulation output
        uses: actions/upload-artifact@v4
        with:
          name: simulation-output
          path: |
            output/khi_Nz512_Ri0.10.nc
            output/khi_Nz512_Ri0.10_2d.nc
          compression-level: 9

  # ---------------------------------------------------------------------------
  # Standalone filter test — no simulation needed, runs in parallel.
  # ---------------------------------------------------------------------------
  test-gaussian-filter:
    name: Test Gaussian filter
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python packages
        run: pip install -r tests/requirements.txt

      - name: Create output directories
        run: mkdir -p figures

      - name: Run Gaussian filter tests
        id: pytest
        run: pytest tests/test_gaussian_filter.py -v -s

      - name: Upload filter test figure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gaussian-filter-test
          path: figures/test_gaussian_filter.png
          if-no-files-found: warn

      - name: Update commit status
        if: inputs.head_sha != '' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.pytest.outcome }}' === 'success';
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head_sha }}',
              state: success ? 'success' : 'failure',
              target_url: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              description: success ? 'Gaussian filter test passed' : 'Gaussian filter test failed',
              context: 'Gaussian Filter Test',
            });


  # ---------------------------------------------------------------------------
  # Test job template — instantiated twice below (time-varying / fixed-ref).
  # ---------------------------------------------------------------------------
  test-time-varying:
    name: Test (time-varying reference)
    needs: simulate
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha || github.sha }}

      - name: Download simulation output
        uses: actions/download-artifact@v4
        with:
          name: simulation-output
          path: output/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python packages
        run: pip install -r tests/requirements.txt

      - name: Create output directories
        run: mkdir -p figures animations postprocessing/output

      - name: Run postprocessing pipeline
        working-directory: postprocessing
        run: N_WORKERS=2 bash 00_get_budgets.sh output/khi_Nz512_Ri0.10.nc --filter-scales 0.8 2

      - name: Run budget closure tests
        id: pytest
        run: pytest tests/ -v -s

      - name: Install ffmpeg
        if: always() && steps.pytest.outcome == 'success'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate animation
        if: always() && steps.pytest.outcome == 'success'
        working-directory: postprocessing
        run: python anim1_panels.py --filename output/khi_Nz512_Ri0.10.nc --filter-scale 0.8 --dpi 100 --fps 8

      - name: List output files
        if: always()
        run: |
          echo "=== figures/ ==="
          ls -la figures/ || echo "(directory missing)"
          echo "=== animations/ ==="
          ls -la animations/ || echo "(directory missing)"
          echo "=== postprocessing/output/ ==="
          ls -la postprocessing/output/ || echo "(directory missing)"

      - name: Upload budget plots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: budget-plots-time-varying
          path: figures/*.png
          if-no-files-found: warn

      - name: Upload animation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: animation-time-varying
          path: animations/*.mp4
          if-no-files-found: warn

      - name: Upload postprocessing NetCDF files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postprocessing-output-time-varying
          path: postprocessing/output/*_integrated.nc
          if-no-files-found: warn

      - name: Update commit status
        if: inputs.head_sha != '' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.pytest.outcome }}' === 'success';
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head_sha }}',
              state: success ? 'success' : 'failure',
              target_url: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              description: success ? 'All budget tests passed' : 'Budget tests failed',
              context: 'Budget Closure Tests (time-varying ref)',
            });

      - name: Comment on PR if tests failed
        if: inputs.pr_number != '' && always() && steps.pytest.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            github.rest.issues.createComment({
              issue_number: ${{ inputs.pr_number || 0 }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Budget closure tests (time-varying ref) failed.** [View run](${runUrl}) for details.`,
            });

  test-fixed-ref:
    name: Test (fixed reference)
    needs: simulate
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha || github.sha }}

      - name: Download simulation output
        uses: actions/download-artifact@v4
        with:
          name: simulation-output
          path: output/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python packages
        run: pip install -r tests/requirements.txt

      - name: Create output directories
        run: mkdir -p figures animations postprocessing/output

      - name: Run postprocessing pipeline (fixed reference)
        working-directory: postprocessing
        run: bash 00_get_budgets.sh output/khi_Nz512_Ri0.10.nc --filter-scales 0.8 2 --fixed-reference

      - name: Run budget closure tests (fixed reference)
        id: pytest
        run: pytest tests/ -v -s --ref-suffix _fixed_ref

      - name: Install ffmpeg
        if: always() && steps.pytest.outcome == 'success'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate animation (fixed reference)
        if: always() && steps.pytest.outcome == 'success'
        working-directory: postprocessing
        run: python anim1_panels.py --filename output/khi_Nz512_Ri0.10.nc --filter-scale 0.8 --dpi 100 --fps 8 --fixed-reference

      - name: List output files
        if: always()
        run: |
          echo "=== figures/ ==="
          ls -la figures/ || echo "(directory missing)"
          echo "=== animations/ ==="
          ls -la animations/ || echo "(directory missing)"
          echo "=== postprocessing/output/ ==="
          ls -la postprocessing/output/ || echo "(directory missing)"

      - name: Upload budget plots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: budget-plots-fixed-ref
          path: figures/*.png
          if-no-files-found: warn

      - name: Upload animation (fixed reference)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: animation-fixed-ref
          path: animations/*.mp4
          if-no-files-found: warn

      - name: Upload postprocessing NetCDF files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postprocessing-output-fixed-ref
          path: postprocessing/output/*_integrated.nc
          if-no-files-found: warn

      - name: Update commit status
        if: inputs.head_sha != '' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.pytest.outcome }}' === 'success';
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head_sha }}',
              state: success ? 'success' : 'failure',
              target_url: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              description: success ? 'All budget tests passed' : 'Budget tests failed',
              context: 'Budget Closure Tests (fixed ref)',
            });

  # ---------------------------------------------------------------------------
  # Combined report — updates the original 'Budget Closure Tests' context that
  # test_trigger.yml sets to pending, so the PR check resolves.
  # ---------------------------------------------------------------------------
  report:
    name: Report combined status
    needs: [test-time-varying, test-fixed-ref, test-gaussian-filter]
    runs-on: ubuntu-latest
    if: inputs.head_sha != '' && always()

    permissions:
      statuses: write

    steps:
      - name: Update combined commit status
        uses: actions/github-script@v7
        with:
          script: |
            const tv = '${{ needs.test-time-varying.result }}';
            const fr = '${{ needs.test-fixed-ref.result }}';
            const gf = '${{ needs.test-gaussian-filter.result }}';
            const success = tv === 'success' && fr === 'success' && gf === 'success';
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head_sha }}',
              state: success ? 'success' : 'failure',
              target_url: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              description: success ? 'All budget tests passed' : 'One or more budget tests failed',
              context: 'Budget Closure Tests',
            });
